  <!-- Lamp outer ring (metal) -->
  <circle cx="128" cy="122" r="19" fill="#3a2a18" stroke="#5a4030" stroke-width="3"/>
  <!-- Lamp glass -->
  <circle cx="128" cy="122" r="14" fill="#F5F5E8"/>
  <!-- Lamp inner glow -->
  <circle cx="128" cy="122" r="10" fill="#FFFFF0"/>
  <!-- Lamp specular highlight -->
  <circle cx="123" cy="117" r="5" fill="white" opacity="0.85"/>
