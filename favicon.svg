  <circle cx="260" cy="190" r="4.5" fill="#b06830" opacity="0.55"/>
  <circle cx="242" cy="190" r="4"   fill="#b06830" opacity="0.5"/>
  <circle cx="256" cy="168" r="3.5" fill="#b06830" opacity="0.45"/>

