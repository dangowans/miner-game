  <circle cx="160" cy="192" r="4"   fill="#b06830" opacity="0.5"/>
  <circle cx="175" cy="167" r="3.5" fill="#b06830" opacity="0.45"/>
  <circle cx="193" cy="175" r="3"   fill="#b06830" opacity="0.45"/>
