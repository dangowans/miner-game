<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mini Miner</title>
  <!-- Favicon – all sizes for browser, tablet & phone support -->
  <link rel="icon" type="image/x-icon"   href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16"  href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32"  href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48"  href="favicon-48x48.png">
  <link rel="apple-touch-icon" sizes="180x180"     href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#111111">
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100svh;
      padding: 8px 4px 16px;
      gap: 0;
    }

    h1 {
      font-size: 1.3em;
      line-height: 1.3;
      color: #f5c842;
      letter-spacing: 2px;
      padding-top: 2px;
      text-shadow: 0 0 8px #a08000;
    }

    /* ── Game wrapper ── */
    #game-wrap {
      position: relative;
      border: 2px solid #444;
      line-height: 0;   /* Remove inline-block gap under canvas */
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 800px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Overlay (shop / bar / doctor / win / death) ── */
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 15, 0.88);
      color: #eee;
      font-family: 'Courier New', Courier, monospace;
      line-height: normal;
      padding: 20px;
      overflow-y: auto;
    }
    #overlay.active { display: block; }

    #overlay h2 {
      color: #f5c842;
      font-size: 1.3em;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    #overlay .shop-balance {
      margin-bottom: 10px;
      font-size: 0.95em;
    }
    #overlay .section-label {
      font-size: 0.72em;
      color: #888;
      letter-spacing: 2px;
      margin: 10px 0 4px;
      border-bottom: 1px solid #333;
      padding-bottom: 2px;
    }
    #overlay .shop-item {
      margin: 6px 0;
      padding: 9px 10px;
      border-radius: 4px;
      font-size: 0.88em;
      line-height: 1.7;
    }
    #overlay .shop-item.buyable {
      background: #1e2a1e;
      border: 1px solid #2e5a2e;
      cursor: pointer;
    }
    #overlay .shop-item.buyable:hover,
    #overlay .shop-item.focused       { background: #243024; border-color: #4a8a4a; }
    #overlay .shop-item.focused       { border-color: #f5c842; outline: none; }
    #overlay .shop-item.disabled {
      background: #1a1a1a;
      border: 1px solid #333;
      opacity: 0.55;
      cursor: default;
    }
    #overlay .shop-item.sell-btn { background: #1a2a1a; border-color: #f5c842; }
    #overlay .shop-item.sell-btn:hover { background: #222a18; }
    #overlay .shop-item.ore-row  { padding: 4px 10px; margin: 2px 0; line-height: 1.3; }
    #overlay .price  { color: #f5c842; }
    #overlay .short  { color: #ff8888; font-size: 0.85em; }
    #overlay .bar-girl { font-size: 0.95em; margin: 10px 0; line-height: 1.6; word-break: break-word; }
    #overlay .hint  { color: #aaa; font-size: 0.85em; line-height: 1.5; margin-top: 8px; word-break: break-word; }

    /* ── Centered full-overlay panels (death, win, dragons, outhouse, proposal) ── */
    #overlay .overlay-centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
      gap: 6px;
      padding: 10px 20px;
      text-align: center;
      box-sizing: border-box;
    }
    /* Spacers compress to zero when content overflows, preventing top-cutoff */
    #overlay .overlay-centered::before,
    #overlay .overlay-centered::after {
      content: '';
      flex: 1;
    }
    #overlay .overlay-centered .overlay-emoji { font-size: 1.8em; line-height: 1.25; margin: 0; padding-top: 2px; }
    #overlay .overlay-centered .overlay-title { font-size: 1.3em; margin: 0; }
    #overlay .overlay-centered p { font-size: 0.88em; margin: 0; word-break: break-word; }
    #overlay .overlay-centered .overlay-tip  { color: #aaa; font-size: 0.82em; }
    #overlay .overlay-centered .overlay-time { color: #888; font-size: 0.82em; }
    #overlay .overlay-centered .close-btn { margin-top: 4px; }

    #overlay .close-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 18px;
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9em;
      line-height: 1.25;
    }
    #overlay .close-btn:hover,
    #overlay .close-btn.focused { background: #383838; }
    #overlay .close-btn.focused { border-color: #f5c842; outline: none; }
    #overlay kbd {
      background: #333;
      border: 1px solid #666;
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 0.8em;
    }

    /* ── HUD bar ── */
    #hud {
      width: 100%;
      max-width: 800px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-top: none;
      padding: 4px 10px 5px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.82em;
    }
    #hud-stats {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      min-height: 22px;
    }
    #hud-hearts { font-size: 1.05em; letter-spacing: 1px; color: #ff8888; }
    .hud-sep { color: #444; }
    .hud-ellipsis-toggle {
      background: #2b2b2b;
      border: 1px solid #555;
      border-radius: 3px;
      color: #ccc;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95em;
      line-height: 1;
      margin-left: 4px;
      padding: 0 6px;
    }
    .hud-ellipsis-toggle:hover {
      background: #3a3a3a;
      border-color: #777;
    }
    .hud-extra-items {
      color: #aaa;
      margin-left: 6px;
    }
    #hud-msg {
      color: #aad4ff;
      font-size: 0.85em;
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 16px;
      line-height: 1.5;
    }

    /* ── D-pad controls ── */
    #controls-wrap {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows:    repeat(3, 60px);
      gap: 4px;
    }
    #controls button {
      width: 60px;
      height: 60px;
      background: #252525;
      border: 1px solid #444;
      border-radius: 8px;
      color: #ccc;
      font-size: 1.6em;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #controls button:active { background: #3a3a3a; }
    #controls button:disabled { opacity: 0.3; cursor: default; }

    #btn-up    { grid-column: 2; grid-row: 1; }
    #btn-left  { grid-column: 1; grid-row: 2; }
    #btn-right { grid-column: 3; grid-row: 2; }
    #btn-down  { grid-column: 2; grid-row: 3; }

    /* ── Inventory buttons (beside D-pad) ── */
    #inventory-btns {
      display: grid;
      grid-template-columns: repeat(2, 52px);
      grid-template-rows:    repeat(3, 52px);
      gap: 4px;
    }
    #inventory-btns button {
      width: 52px;
      height: 52px;
      background: #252525;
      border: 1px solid #444;
      border-radius: 8px;
      color: #ccc;
      font-size: 1.4em;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #inventory-btns button:active { background: #3a3a3a; }
    #inventory-btns button:disabled { opacity: 0.3; cursor: default; }

    #controls-label {
      margin-top: 6px;
      font-size: 0.72em;
      color: #555;
      text-align: center;
    }

    /* ── Overlay building header (title + close button) ── */
    #overlay .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    #overlay .overlay-header h2 {
      margin-bottom: 0;
      flex: 1;
    }
    #overlay .overlay-header .close-btn {
      margin-top: 0;
      padding: 5px 10px;
      flex-shrink: 0;
    }

    /* ── Shop item with icon picture ── */
    #overlay .shop-item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    #overlay .shop-item-icon {
      font-size: 1.8em;
      line-height: 1.1;
      flex-shrink: 0;
      width: 2em;
      text-align: center;
    }
    #overlay .shop-item-text {
      flex: 1;
    }

    /* ── Game title bar (title + overlay close button) ── */
    #game-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
      margin-bottom: 6px;
    }
    #game-title-bar h1 {
      margin-bottom: 0;
      align-self: auto;
    }
    #title-close-btn {
      display: none;
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9em;
      line-height: 1.25;
      padding: 5px 10px;
    }
    #title-close-btn:hover { background: #383838; }

    /* ── Page layout: game area + controls ── */
    #page-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── Side panel: HUD + controls (portrait: full-width column) ── */
    #side-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── Landscape mode: buttons + HUD beside the game screen ── */
    @media (orientation: landscape) and (max-height: 520px) {
      body {
        padding: 4px 8px 8px;
        justify-content: center;
      }
      #page-layout {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      #game-area {
        flex: 1;
        min-width: 0;
      }
      h1 {
        font-size: 1em;
        margin-bottom: 4px;
      }
      #side-panel {
        flex-shrink: 0;
        width: 200px;
        gap: 8px;
      }
      #hud {
        width: 100%;
        box-sizing: border-box;
        border-top: 1px solid #333;
      }
      #hud-msg {
        white-space: normal;
        word-break: break-word;
      }
      #controls-wrap {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>

  <div id="page-layout">
    <div id="game-area">
      <div id="game-title-bar">
        <h1>⛏ MINI MINER</h1>
        <button id="title-close-btn">✕ &nbsp;<kbd>Esc</kbd></button>
      </div>

      <div id="game-wrap">
        <canvas id="canvas" width="816" height="476"></canvas>
        <div id="overlay"></div>
      </div>
    </div>

    <!-- Side panel: HUD + controls (HUD moves above buttons in landscape) -->
    <div id="side-panel">
      <!-- HUD -->
      <div id="hud">
        <div id="hud-stats">
          <span id="hud-hearts">♥♥♥</span>
          <span class="hud-sep">|</span>
          <span>💰&nbsp;<span id="hud-money">0</span></span>
          <span class="hud-sep">|</span>
          <span id="hud-gems-detail">💎 0/10</span>
          <span id="hud-tools"></span>
        </div>
        <span id="hud-msg"></span>
      </div>

      <!-- Mobile D-pad + Inventory -->
      <div id="controls-wrap">
        <div id="controls" aria-label="Game controls">
          <button id="btn-up"    title="Move up (W / ↑)"    aria-label="Up">▲</button>
          <button id="btn-left"  title="Move left (A / ←)"  aria-label="Left">◀</button>
          <button id="btn-right" title="Move right (D / →)" aria-label="Right">▶</button>
          <button id="btn-down"  title="Move down (S / ↓)"  aria-label="Down">▼</button>
        </div>
        <div id="inventory-btns" aria-label="Inventory">
          <button id="btn-dynamite" title="Place dynamite (X)"               aria-label="Dynamite" disabled>🧨</button>
          <button id="btn-drill"    title="Use drill (V)"                    aria-label="Drill" disabled>🪛</button>
          <button id="btn-minecart" title="Send mine cart to bank (C)"       aria-label="Mine Cart" style="display:none">🚃</button>
          <button id="btn-firstaid" title="Use First Aid Kit"                aria-label="First Aid Kit" disabled>🩹</button>
          <button id="btn-radio"    title="Use radio — teleport to entrance" aria-label="Radio" style="display:none">📻</button>
        </div>
      </div>
    </div>
  </div>
  <div id="controls-label">Arrow keys / WASD to move &nbsp;·&nbsp; E / Enter to interact &nbsp;·&nbsp; X dynamite &nbsp;·&nbsp; V drill &nbsp;·&nbsp; 🩹 first aid &nbsp;·&nbsp; 🚃 mine cart (if purchased) &nbsp;·&nbsp; 📻 radio (if found)</div>

  <!-- Game scripts (order matters – constants first) -->
  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/world.js"></script>
  <script src="js/player.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/input.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/game.js"></script>

  <!-- Service-worker registration + periodic update check -->
  <script>
    if ('serviceWorker' in navigator) {
      // Re-check for an updated service worker every hour so that new script
      // versions are picked up even while the game is running continuously.
      const UPDATE_CHECK_INTERVAL_MS = 60 * 60 * 1000;

      navigator.serviceWorker.register('./sw.js').then(registration => {
        const updateIntervalId = setInterval(() => registration.update(), UPDATE_CHECK_INTERVAL_MS);

        // When a new service worker takes control, clear the interval and
        // reload the page so the latest scripts are used immediately.
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          clearInterval(updateIntervalId);
          window.location.reload();
        });
      });
    }
  </script>

</body>
</html>
